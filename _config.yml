# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.

# Theme Settings
minimal_mistakes_skin    : "default" # Sugestão: tente mudar para "dark" depois se quiser um visual noturno de programador

# Site Settings
locale                   : "pt-BR"
direction                : "ltr"
title                    : "Gabriel Nogueira Oliveira"
title_separator          : "|"
subtitle                 : "Portfólio de Ciência de Dados"
name                     : "Gabriel Nogueira Oliveira"
description              : "Portfólio de projetos em Ciência de Dados."
url                      : "https://gabrielnoliveirads.github.io"
baseurl                  : ""
repository               : "gabrielnoliveirads/gabrielnoliveirads.github.io"
teaser                   : 
logo                     : 
masthead_title           : "Gabriel Oliveira"
breadcrumbs              : false
words_per_minute         : 200
enable_copy_code_button  : true # Ativei o botão de copiar código, excelente para portfólios tech
copyright                : 
copyright_url            : 

# Comments (Desativados por enquanto)
comments:
  provider               : false

# Search
search                   : true
search_full_content      : false
search_provider          : lunr

# SEO Related
google_site_verification :
bing_site_verification   :

# Social Sharing
twitter:
  username               :
facebook:
  username               :
og_image                 : 
og_image_alt             : 

# Analytics (Pode adicionar seu ID do Google Analytics depois)
analytics:
  provider               : false

# Site Author
author:
  name             : "Gabriel Nogueira Oliveira"
  avatar           : # Caminho para sua foto, ex: "/assets/images/perfil.jpg"
  bio              : "Graduando em Ciência de Dados na Universidade Federal de Viçosa (UFV)."
  location         : "Viçosa, MG - Brasil"
  email            : "gabriel.n.oliveira.ds@gmail.com"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/gabrielnoliveirads"
    # Você pode descomentar e adicionar seu LinkedIn depois:
    # - label: "LinkedIn"
    #   icon: "fab fa-fw fa-linkedin"
    #   url: "https://linkedin.com/in/seu-usuario"

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/gabrielnoliveirads"
  since: "2026"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - minimal-mistakes-jekyll.gemspec
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - /docs 
  - /test 
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed 
  quiet_deps: true
  silence_deprecations: ['import']

# Outputting
permalink: /:categories/:title/
timezone: "America/Sao_Paulo" # Fuso horário corrigido para sua região

# Pagination with jekyll-paginate
paginate: 5 
paginate_path: /page:num/

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      
collections:
  projects:
    output: true
    permalink: /projects/:path/